<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

/* =========================
   GLOBAL
========================= */

@font-face {
  font-family: "Bender";
  src: url("./assets/fonts/Bender.woff2") format("woff2");
  font-display: swap;
}

@font-face {
  font-family: "Bender";
  src: url("./assets/fonts/Bender-Bold.woff2") format("woff2");
  font-weight: 700;
  font-display: swap;
}

html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

html {
  background-color: #111;
}

body {
  display: flex;
  flex-direction: column;
  font-family: "Bender", Arial, sans-serif;
  letter-spacing: 0.4px;
  color: #eee;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* =========================
   HEADER
========================= */

header {
  background-color: #1a1a1a;
  padding: 0 20px;
  height: 44px;
  border-bottom: 1px solid #333;
  position: sticky;
  top: 0;
  z-index: 100;
}

header h2 {
  margin: 0;
  color: #f5c542;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 2px;
  user-select: none;
}

.header-logo-link {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  text-decoration: none;
}

.header-logo-link:hover h2 {
  color: #ffd966;
}

.header-logo-img {
  width: 36px;
  height: 36px;
  object-fit: contain;
  flex-shrink: 0;
  opacity: 0.9;
  transition: opacity 0.15s;
  user-select: none;
  pointer-events: none;
}

.header-logo-link:hover .header-logo-img {
  opacity: 1;
}

.header-content {
  display: flex;
  align-items: center;
  gap: 15px;
  height: 100%;
}

.header-btn {
  background: #222;
  border: 1px solid #333;
  color: #aaa;
  padding: 5px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: "Bender", Arial, sans-serif;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 1px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  margin-left: auto;
}

#lang-switcher {
  display: flex;
  align-self: center;
}
#lang-switcher .custom-select-trigger {
  background: #222;
  border-color: #333;
  color: #aaa;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  height: auto;
  padding: 5px 28px 5px 12px;
}

#lang-switcher .custom-select-trigger:hover {
  background: #2a2a2a;
  color: #ccc;
  border-color: #555;
}

.header-btn:hover {
  background: #2a2a2a;
  color: #f5c542;
  border-color: #444;
}

.header-btn:active {
  transform: scale(0.95);
  transition: transform 0.08s ease, background 0.15s, color 0.15s, border-color 0.15s;
}

#tarkov-clock {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 12px;
  border-left: 1px solid #2a2a2a;
  user-select: none;
  cursor: default;
}

#tarkov-clock-label {
  font-family: "Bender", Arial, sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #444;
  margin-right: 2px;
}

.tarkov-clock-entry {
  display: flex;
  align-items: center;
  gap: 5px;
}

.tarkov-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tarkov-dot-day   { background: #c4952a; }
.tarkov-dot-night { background: #5a5a8a; }

.tarkov-clock-time {
  font-family: "Bender", Arial, sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  min-width: 58px;
}

/* colors are set dynamically via style.color in timeColor() in app.js */

#tarkov-clock-sep {
  color: #2e2e2e;
  font-size: 12px;
  font-family: "Bender", Arial, sans-serif;
}

/* =========================
   LAYOUT
========================= */

.container {
  display: flex;
  flex: 1;
  min-height: 0;
}

.left-panel {
  flex: 0 0 auto;
  width: 560px; /* overridden by JS */

  display: flex;
  flex-direction: column;
  padding: 20px 0 20px 20px;
  min-height: 0;
  overflow: hidden;
}

.panel-resizer {
  position: relative;
  flex: 0 0 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: col-resize;
  background: #111;
  border-left: 1px solid #2a2a2a;
  border-right: 1px solid #2a2a2a;
  user-select: none;
  transition: flex-basis 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
              background 0.15s ease,
              border-color 0.15s ease;
  z-index: 10;
  margin-bottom: 19px;
}

.panel-resizer:hover,
.panel-resizer.dragging {
  flex: 0 0 28px;
  background: #1a1a1a;
  border-color: #444;
}

/* Dots */
.panel-resizer-handle {
  width: 3px;
  height: 28px;
  background-image: radial-gradient(circle, #555 1.5px, transparent 1.5px);
  background-size: 3px 7px;
  transition: opacity 0.15s ease;
}

.panel-resizer:hover .panel-resizer-handle,
.panel-resizer.dragging .panel-resizer-handle {
  opacity: 0;
}

/* Arrow - fades in after dots fade out */
.panel-resizer::after {
  content: '↔';
  position: absolute;
  font-size: 15px;
  color: #777;
  opacity: 0;
  transition: opacity 0.15s ease 0.1s, color 0.15s ease;
  pointer-events: none;
}

.panel-resizer:hover::after,
.panel-resizer.dragging::after {
  opacity: 1;
  color: #aaa;
}

/* Publish-mode resizer */
.panel-resizer.publish-mode,
.panel-resizer.publish-mode:hover {
  flex: 0 0 42px;
  background: #130f00;
  border-color: #c8a84b;
}

.panel-resizer.publish-mode .panel-resizer-handle {
  opacity: 0;
}

.panel-resizer.publish-mode::after {
  opacity: 0 !important;
}

.panel-resizer-publish-hint {
  display: none;
  flex-direction: row;
  align-items: center;
  gap: 1px;
  position: absolute;
  pointer-events: none;
}

.panel-resizer.publish-mode .panel-resizer-publish-hint {
  display: flex;
}

.panel-resizer-publish-hint span {
  color: #c8a84b;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
  opacity: 0;
  animation: pub-chevron-pulse 1.5s ease-in-out infinite;
}

/* Wave travels right-to-left: rightmost lights up first, pulling the eye left */
.panel-resizer-publish-hint span:nth-child(3) { animation-delay: 0s; }
.panel-resizer-publish-hint span:nth-child(2) { animation-delay: 0.2s; }
.panel-resizer-publish-hint span:nth-child(1) { animation-delay: 0.4s; }

@keyframes pub-chevron-pulse {
  0%, 100% { opacity: 0.1; }
  40%       { opacity: 1; }
  70%       { opacity: 0.1; }
}

#left-build-area {
  display: flex;
  flex-direction: column;
  min-height: 0;
  flex: 1;
}

#stats {
  flex-shrink: 0;
  padding-right: 20px;
}

#slots {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: #444 #111;
  scrollbar-gutter: stable;
  padding-right: 10px;
}

#weapon-selector {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: #444 #111;
  scrollbar-gutter: stable;
  padding-right: 10px;
}

#price-overview {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: #444 #111;
  scrollbar-gutter: stable;
  padding-right: 10px;
  flex-direction: column;
}

#price-overview .stats-section {
  flex-shrink: 0;
}

#slots::-webkit-scrollbar,
#weapon-selector::-webkit-scrollbar,
#price-overview::-webkit-scrollbar {
  width: 10px;
}

#slots::-webkit-scrollbar-track,
#weapon-selector::-webkit-scrollbar-track,
#price-overview::-webkit-scrollbar-track {
  background: #111;
}

#slots::-webkit-scrollbar-thumb,
#weapon-selector::-webkit-scrollbar-thumb,
#price-overview::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 6px;
  border: 2px solid #111;
}

#slots::-webkit-scrollbar-thumb:hover,
#weapon-selector::-webkit-scrollbar-thumb:hover,
#price-overview::-webkit-scrollbar-thumb:hover {
  background: #555;
}

.right-panel {
  flex: 1;
  min-width: 0;

  overflow-x: hidden;
  overflow-y: auto;
  padding: 20px 20px 20px 20px;
  min-height: 0;
}

/* Fullscreen selector mode */
.container.no-gun .left-panel {
  flex: 1 1 100%;
  width: 100% !important;
  overflow-y: auto;
}

.container.no-gun .right-panel {
  display: none;
}

.container.no-gun .panel-resizer {
  display: none;
}

/* =========================
   WEAPON LIST
========================= */

#guns {
  list-style: none;
  padding: 0;
  margin: 0;
}

.gun-list-item {
  display: flex;
  gap: 10px;
  align-items: center;
}

.gun-list-icon {
  width: 50px;
  height: 50px;
  object-fit: contain;
  background-color: #1a1a1a;
  border-radius: 4px;
}

.selected-gun {
  background-color: #333;
  padding: 6px;
  border-radius: 4px;
}

/* =========================
   SCROLLBARS
========================= */

.left-panel,
.right-panel {
  scrollbar-width: thin;
  scrollbar-color: #444 #111;
}

.left-panel::-webkit-scrollbar,
.right-panel::-webkit-scrollbar {
  width: 10px;
}

.left-panel::-webkit-scrollbar-track,
.right-panel::-webkit-scrollbar-track {
  background: #111;
}

.left-panel::-webkit-scrollbar-thumb,
.right-panel::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 6px;
  border: 2px solid #111;
}

.left-panel::-webkit-scrollbar-thumb:hover,
.right-panel::-webkit-scrollbar-thumb:hover {
  background: #555;
}

*, *::before, *::after {
  box-sizing: border-box;
}

/* =========================
   STATS SECTION
========================= */

.stats-section {
  background: linear-gradient(180deg, #181818, #141414);
  border: 1px solid #222;
  border-radius: 8px;
  padding: 14px 16px 12px 16px;
  margin-bottom: 14px;
  overflow: hidden;
}

.section-title {
  color: #f5c542;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-left: 10px;
  border-left: 3px solid #f5c542;
  user-select: none;
  transition: color 0.2s ease, border-left-color 0.2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tree-view-toggle {
  margin-left: auto;
  display: flex;
  gap: 4px;
}
.tree-view-toggle .toggle-btn {
  font-size: 14px;
  padding: 2px 7px;
}

@keyframes sectionTitleIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.section-title-anim {
  animation: sectionTitleIn 0.18s ease both;
}

.stat-line {
  margin-bottom: 6px;
  font-size: 14px;
  font-weight: 700;
}

/* =========================
   HIDDEN STATS
========================= */

.stats-title-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hidden-stats-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 0;
  background: none;
  border: none;
  cursor: pointer;
  user-select: none;
  font-family: "Bender", Arial, sans-serif;
  flex-shrink: 0;
}

.hidden-stats-btn:hover .hidden-stats-label {
  color: #aaa;
}

.hidden-stats-label {
  font-size: 10px;
  color: #666;
  font-weight: 700;
  transition: color 0.15s;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.hidden-stats-arrow {
  font-size: 8px;
  color: #666;
  transition: transform 0.2s;
  display: inline-block;
}

.hidden-stats-btn.open .hidden-stats-arrow {
  transform: rotate(180deg);
}

.hidden-stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}

.hidden-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  padding: 2px 0;
}

.hidden-stat-label {
  color: #888;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.hidden-stat-value {
  color: #ccc;
  font-weight: 700;
}

/* =========================
   AMMO SELECT
========================= */

/* native selects are hidden when the custom UI is active */
#ammo-select,
#ubgl-ammo-select,
#lang-select,
#cb-sort-select {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 0;
  height: 0;
}

/* =========================
   CUSTOM SELECT
========================= */

.custom-select-wrapper {
  position: relative;
  user-select: none;
}

/* ammo dropdown fills remaining space in mag-controls */
.mag-controls .custom-select-wrapper {
  flex: 1;
  min-width: 0;
}

/* lang dropdown auto-sizes to its content */
#lang-switcher .custom-select-wrapper {
  height: auto;
}

.custom-select-trigger {
  display: flex;
  align-items: center;
  background: #1a1a1a;
  color: #eee;
  border: 1px solid #444;
  padding: 5px 28px 5px 12px;
  border-radius: 999px;
  font-family: "Bender", Arial, sans-serif;
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-sizing: border-box;
  transition: border-color 0.15s;
  position: relative;
}

.custom-select-trigger::after {
  content: "▾";
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
  font-size: 18px;
  line-height: 1;
  pointer-events: none;
  transition: transform 0.2s ease;
}

.custom-select-wrapper.open .custom-select-trigger {
  border-color: #666;
}

.custom-select-wrapper.open .custom-select-trigger::after {
  transform: translateY(-50%) rotate(180deg);
}

.custom-select-trigger:hover {
  background: #222;
  border-color: #555;
}

.custom-select-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #1a1a1a;
  border: none;
  border-radius: 10px;
  max-height: 260px;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 300;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.8);
  scrollbar-width: thin;
  scrollbar-color: #444 #1a1a1a;
}

.custom-select-list::-webkit-scrollbar {
  width: 5px;
}

.custom-select-list::-webkit-scrollbar-track {
  background: #1a1a1a;
}

.custom-select-list::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}

.custom-select-list::-webkit-scrollbar-thumb:hover {
  background: #555;
}


@keyframes selectItemIn {
  from { opacity: 0; transform: translateX(14px); }
  to   { opacity: 1; transform: translateX(0); }
}

.custom-select-wrapper.open .custom-select-list {
  display: block;
}

.custom-select-wrapper.open .custom-select-option {
  animation: selectItemIn 0.16s ease both;
  animation-delay: calc(var(--i, 0) * 25ms);
}

.custom-select-option {
  padding: 5px 12px;
  cursor: pointer;
  font-family: "Bender", Arial, sans-serif;
  font-size: 13px;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.1s, color 0.1s;
}

.custom-select-option:first-child {
  border-radius: 10px 10px 0 0;
}

.custom-select-option:last-child {
  border-radius: 0 0 10px 10px;
}

.custom-select-option:only-child {
  border-radius: 10px;
}

.custom-select-option:hover {
  background: #252525;
  color: #f5c542;
}

.custom-select-option.selected {
  background: #1e1e1e;
  color: #f5c542;
}

.mag-controls {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}

.mag-controls .compare-toggle {
  white-space: nowrap;
  flex-shrink: 0;
}

.ubgl-ammo-label {
  flex-shrink: 0;
  white-space: nowrap;
  font-family: "Bender", Arial, sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: #555;
  user-select: none;
}

.mag-controls .custom-select-wrapper.ammo-disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.mag-controls .custom-select-wrapper.ammo-disabled .custom-select-trigger {
  cursor: not-allowed;
  pointer-events: none;
}



.mag-controls .compare-toggle.active {
  color: #555;
}

.mag-controls .compare-toggle.active:hover {
  color: #888;
}

.mag-controls .compare-toggle.active .compare-toggle-track {
  background: #1e1800;
  border-color: #f5c542;
}

.mag-controls .compare-toggle.active .compare-toggle-knob {
  background: #f5c542;
}

/* =========================
   ATTACHMENT TABLE
========================= */

.att-table-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 4px;
}

.att-table-gun-img {
  height: 56px;
  width: auto;
  max-width: 140px;
  object-fit: contain;
  flex-shrink: 0;
  opacity: 0.85;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}

.att-table-slot-placeholder {
  opacity: 1;
  filter: none;
}

.att-table-icon-preview {
  position: relative;
  display: inline-flex;
  flex-shrink: 0;
}

.att-table-header h3 {
  margin: 0;
  color: #f5c542;
  font-weight: normal;
}

.attachment-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;
  margin-top: 15px;
}

.attachment-table th,
.attachment-table td {
  padding: 10px 12px;
}

.attachment-table th {
  text-align: left;
  color: #aaa;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: -40px;
  padding-top: 30px;
  background: #111;
  z-index: 2;
  box-shadow: 0 1px 0 #333;
}

.attachment-table td {
  border-bottom: 1px solid #1f1f1f;
  vertical-align: middle;
  font-size: 13px;
}

/* Name column stretches to fill remaining space */
.attachment-table th:nth-child(1),
.attachment-table td:nth-child(1) {
  width: 100%;
}

/* Stat columns: fixed width, right-aligned, no wrapping */
.attachment-table th:nth-child(2),
.attachment-table th:nth-child(3),
.attachment-table th:nth-child(4),
.attachment-table th:nth-child(5),
.attachment-table th:nth-child(6),
.attachment-table td:nth-child(2),
.attachment-table td:nth-child(3),
.attachment-table td:nth-child(4),
.attachment-table td:nth-child(5),
.attachment-table td:nth-child(6) {
  width: 1px;
  white-space: nowrap;
  text-align: right;
  font-weight: 700;
  font-family: "Bender", Arial, sans-serif;
}

/* Auto-hide empty columns */
.attachment-table.hide-col-weight th:nth-child(2),
.attachment-table.hide-col-weight td:nth-child(2) { display: none; }
.attachment-table.hide-col-recoil th:nth-child(3),
.attachment-table.hide-col-recoil td:nth-child(3) { display: none; }
.attachment-table.hide-col-acc th:nth-child(4),
.attachment-table.hide-col-acc td:nth-child(4) { display: none; }
.attachment-table.hide-col-ergo th:nth-child(5),
.attachment-table.hide-col-ergo td:nth-child(5) { display: none; }
.attachment-table.hide-col-evo th:nth-child(6),
.attachment-table.hide-col-evo td:nth-child(6) { display: none; }

/* Attachment name + icon */
.attachment-name-wrapper {
  display: flex;
  align-items: center;
  gap: 14px;
}

.attachment-name-text {
  width: 100%;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
}

.attachment-icon {
  width: 48px;
  height: 48px;
  object-fit: contain;
  flex-shrink: 0;
  display: block;
}

.attachment-icon-wrapper {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
}

/* Prevent tall rows */
.attachment-table tbody tr {
  height: 64px;
  cursor: pointer;
}

.attachment-table tbody tr:hover {
  background-color: #1e1e1e;
}

.attachment-table tbody tr.attachment-row-installed:hover {
  background: linear-gradient(
    90deg,
    rgba(255, 196, 0, 0.18),
    rgba(255, 196, 0, 0.06)
  );
}

/* =========================
   ATTACHMENT RATING BUTTONS
========================= */

.att-name-and-rating {

/* Button badge - add data-badge="New!" or data-badge="3" to any button */
button[data-badge]:not([data-badge=""]) {

button[data-badge]:not([data-badge=""])::after {
  content: attr(data-badge);
  position: absolute;
  top: -9px;
  right: -10px;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  background: #f5c542;
  color: #1a1400;

  animation: btn-badge-pulse 2.2s ease-in-out infinite;
  z-index: 10;
}

button[data-badge]:not([data-badge=""])[data-badge-pulse="false"]::after {
  animation: none;
  box-shadow: 0 1px 5px rgba(0, 0, 0, 0.7);
}

@keyframes btn-badge-pulse {

/* =========================
   GUN GRID
========================= */

.gun-grid {
  display: grid;
  gap: 10px;
  margin-top: 10px;
}

/* Fullscreen */
.container.no-gun .gun-grid {
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
}

/* Dual panel mode */
.container:not(.no-gun) .gun-grid {
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
}

@keyframes gunCardEntrance {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes panelEnter {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.panel-enter {
  animation: panelEnter 0.2s ease forwards;
}

@keyframes tableSlideIn {
  from { opacity: 0; transform: translateX(18px); }
  to   { opacity: 1; transform: translateX(0); }
}

.table-slide-in {
  animation: tableSlideIn 0.18s ease forwards;
}

.gun-card-entering {
  opacity: 0;
  animation: gunCardEntrance 0.3s ease forwards;
}

.gun-card {
  background: #151515;
  border: 1px solid #222;
  border-radius: 8px;
  padding: 8px;
  cursor: pointer;
  transition: border-color 0.15s ease, transform 0.15s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  overflow: hidden;
  position: relative;
}

.gun-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 8px;
  padding: 1px;
  background: radial-gradient(
    circle 110px at var(--mouse-x, -200px) var(--mouse-y, -200px),
    rgba(245, 197, 66, 0.75),
    transparent 70%
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  mask-composite: exclude;
  pointer-events: none;
}

.gun-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 8px;
  background: radial-gradient(
    circle 220px at var(--mouse-x, -450px) var(--mouse-y, -450px),
    rgba(255, 255, 255, 0.05),
    transparent 70%
  );
  pointer-events: none;
}

.gun-card img {
  width: 100%;
  height: 60px;
  object-fit: contain;
  object-position: center;
  margin-bottom: 6px;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;

  transition: transform 0.18s ease;
}

.gun-name {
  font-size: 14px;
  font-weight: 500;
  margin-top: auto;
  color: #cfcfcf;
  user-select: none;
}

.gun-card:hover {
  border-color: #333;
}

.gun-card:hover img {
  transform: scale(1.05);
}

.gun-card.selected {
  border: 1px solid #f5c542;
  background: #1f1a10;
}

.gun-card.mid-build {
  border-color: #c8a84b;
  background: #191408;
  animation: mid-build-pulse 2.4s ease-in-out infinite;
}

@keyframes mid-build-pulse {
  0%, 100% { box-shadow: 0 0 0 0px rgba(200, 168, 75, 0); }
  55%       { box-shadow: 0 0 0 3px rgba(200, 168, 75, 0.18); }
}

.caliber-header {
  grid-column: 1 / -1;
  margin-top: 18px;

  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;

  color: #f5c542;
  opacity: 0.9;

  padding-left: 4px;
}

.tree-slot {
    margin-bottom: 6px;
    cursor: pointer;
    position: relative;
}

.tree-children {
    margin-left: 20px;
    border-left: 1px dashed rgba(255,255,255,0.25);
    padding-left: 10px;
    overflow: hidden;
    transition: height 0.15s ease-out, opacity 0.15s ease-out;
}

/* =========================
   TREE CONNECTORS
========================= */

.tree-slot::after {
    content: "";
    position: absolute;
    left: -10px;
    top: 50%;
    width: 10px;
    border-top: 1px dashed rgba(255,255,255,0.25);
}

/* root level should have no connector */
.tree-slot.depth-0::before,
.tree-slot.depth-0::after {
    display: none;
}

.tree-slot-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #181818;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 4px 8px;
    transition: all 0.15s ease;
}

.tree-slot-inner {
    overflow: hidden;
    position: relative;
}

.tree-slot-inner::after {
    content: "";
    position: absolute;
    top: -150%;
    left: 0;
    width: 100%;
    height: 400%;
    pointer-events: none;
    opacity: 0;
}

.slot-flash-install .tree-slot-inner::after {
    background: linear-gradient(
        90deg,
        rgba(80, 200, 80, 0) 0%,
        rgba(80, 200, 80, 0.5) 50%,
        rgba(80, 200, 80, 0) 100%
    );
    opacity: 1;
    animation: sweepLeft 0.6s ease-out forwards;
}

.slot-flash-remove .tree-slot-inner::after {
    background: linear-gradient(
        90deg,
        rgba(200, 60, 60, 0) 0%,
        rgba(200, 60, 60, 0.5) 50%,
        rgba(200, 60, 60, 0) 100%
    );
    opacity: 1;
    animation: sweepRight 0.6s ease-out forwards;
}

.slot-flash-reveal .tree-slot-inner::after {
    background: linear-gradient(
        90deg,
        rgba(180, 180, 180, 0) 0%,
        rgba(180, 180, 180, 0.2) 50%,
        rgba(180, 180, 180, 0) 100%
    );
    opacity: 1;
    animation: sweepLeft 0.6s ease-out forwards;
}

.slot-flash-conflict .tree-slot-inner::after {
    background: linear-gradient(
        90deg,
        rgba(220, 50, 50, 0) 0%,
        rgba(220, 50, 50, 0.6) 50%,
        rgba(220, 50, 50, 0) 100%
    );
    opacity: 1;
    animation: conflictPulse 0.15s ease-out forwards;
}

@keyframes sweepLeft {
    from { transform: translateX(-200%) rotate(-30deg); }
    to   { transform: translateX(200%) rotate(-30deg); }
}

@keyframes sweepRight {
    from { transform: translateX(200%) rotate(-30deg); }
    to   { transform: translateX(-200%) rotate(-30deg); }
}

@keyframes conflictPulse {
    0%   { opacity: 0; }
    40%  { opacity: 1; }
    100% { opacity: 0; }
}

.tree-flash-overlay {
    pointer-events: none;
    overflow: hidden;
    z-index: 9999;
}

.tree-flash-overlay::after {
    content: "";
    position: absolute;
    top: -150%;
    left: 0;
    width: 100%;
    height: 400%;
}

.tree-flash-overlay.reset::after {
    background: linear-gradient(
        90deg,
        rgba(80, 200, 80, 0) 0%,
        rgba(80, 200, 80, 0.35) 50%,
        rgba(80, 200, 80, 0) 100%
    );
    animation: sweepLeft 0.5s ease-out forwards;
}

.tree-flash-overlay.strip::after {
    background: linear-gradient(
        90deg,
        rgba(200, 60, 60, 0) 0%,
        rgba(200, 60, 60, 0.35) 50%,
        rgba(200, 60, 60, 0) 100%
    );
    animation: sweepRight 0.5s ease-out forwards;
}

/* ===========================
   ATTACHMENT GRID
=========================== */

/* Reset tree-list styles for grid cells */
.tree-slot.ag-cell {
    margin: 0 !important;
    padding: 0;
    border: 1px solid #2a2a2a;
    border-radius: 0;
    background: #161616;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    overflow: hidden;
    position: relative;
    user-select: none;
}
.tree-slot.ag-cell::before,
.tree-slot.ag-cell::after { display: none !important; }
.tree-slot.ag-cell:hover { background: rgba(255, 255, 255, 0.07); border-color: #3a3a3a; }
.tree-slot.ag-cell.active-slot {
    border-color: #6b5a28;
    background: #1e1b12;
}

/* Inner wrapper - needed by flash CSS (::after) and removeAttachment swipe strip */
.ag-cell .tree-slot-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 100%;
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    /* reset tree styles */
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
}
/* Item container - needed by updateSlotIcon (querySelector(".tree-slot-item")) */
.ag-cell .tree-slot-item {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
    position: relative;
}

/* Installed attachment icon */
.ag-icon {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* updateSlotIcon writes .tree-slot-icon into .tree-slot-item */
.ag-cell .tree-slot-icon {
    display: flex;
    flex: 1;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
}
.ag-cell .tree-slot-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* Short name: top-left corner of cell */
.ag-cell .slot-shortname {
    position: absolute;
    top: 2px;
    left: 2px;
    font-family: "Bender", sans-serif;
    font-size: 8px;
    color: #ccc;
    text-shadow: 0 0 3px #000, 0 0 6px #000;
    pointer-events: none;
    user-select: none;
    line-height: 1;
}

/* Empty slot placeholder */
.ag-empty {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2e2e2e;
    font-size: 20px;
}

/* Slot placeholder image (grid view) */
.slot-placeholder-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 1;
    pointer-events: none;
}

/* Slot placeholder image (list view - fixed size to match .empty-slot) */
.tree-slot-item > .slot-placeholder-img {
    width: 48px;
    height: 48px;
}

/* Slot name label beneath the icon */
.ag-label {
    font-size: 8px;
    color: #aaa;
    text-align: center;
    line-height: 1;
    max-width: 46px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
    flex-shrink: 0;
    padding-bottom: 1px;
}

/* Grid wrapper and grid */
.attachment-grid-wrapper {
    padding-top: 4px;
    overflow-x: auto;
    overflow-y: visible;
    scrollbar-width: thin;
    scrollbar-color: #444 #111;
}

/* Grid view - center the grid horizontally and vertically in the panel */
#slots[data-view="grid"] {
    display: flex;
    flex-direction: column;
}

#slots[data-view="grid"] .stats-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: visible;
}

#slots[data-view="grid"] #tree-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#slots[data-view="grid"] .attachment-grid-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.attachment-grid {
    display: grid;
    grid-template-columns: repeat(10, 48px);
    /* grid-template-rows set dynamically in JS: repeat(N, 48px) */
    gap: 0;
    user-select: none;
    -webkit-user-select: none;
}

.attachment-grid img,
.attachment-grid .slot-placeholder-img {
    -webkit-user-drag: none;
    pointer-events: none;
}

/* Re-enable selection and drag in dev mode */
.attachment-grid[data-ag-dev="1"] {
    user-select: auto;
    -webkit-user-select: auto;
}

.attachment-grid[data-ag-dev="1"] img,
.attachment-grid[data-ag-dev="1"] .slot-placeholder-img {
    -webkit-user-drag: auto;
    pointer-events: auto;
}

/* Gun image cell - non-interactive, spans 3 columns */
.ag-gun-cell {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    pointer-events: none;
    background: #161616;
    border: 1px solid #2a2a2a;
    position: relative;
    overflow: hidden;
}
.ag-gun-cell img {
    flex: 1;
    min-height: 0;
    width: 100%;
    object-fit: contain;
    opacity: 0.7;
    filter: brightness(0.85);
}
/* Queue overlay - shown on gun images while waiting in server generation queue */
.bp-gun-img-wrap {
    position: relative;
    display: inline-block;
}
.bp-queue-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 32px;
    height: 32px;
    z-index: 1;
}
.ag-gun-cell .bp-queue-overlay {
    width: 20px;
    height: 20px;
}
.ag-gun-label {
    max-width: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
}

/* Extras row - slots without a defined grid position */
.ag-extras {
    margin-top: 4px;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
}
.ag-extras .tree-slot.ag-cell {
    position: relative;
    width: 48px;
    height: 58px;
}

/* Mobile scaling */
@media (max-width: 480px) {
    .attachment-grid { grid-template-columns: repeat(10, 40px); }
    .ag-extras .tree-slot.ag-cell { width: 40px; height: 40px; }
    .ag-empty { font-size: 14px; }
}

/* Parent slot pulse when hovering a child slot */
@keyframes ag-parent-pulse {
    0%, 100% { opacity: 0.15; }
    50%       { opacity: 1; }
}
.ag-pulse-overlay {
    position: absolute;
    inset: 0;
    background: rgba(100, 160, 220, 0.18);
    border: 1px solid rgba(100, 160, 220, 0.35);
    box-sizing: border-box;
    pointer-events: none;
    animation: ag-parent-pulse 1.2s ease-in-out infinite;
    z-index: 10;
}

/* Conflict flash overlay for grid cells */
@keyframes ag-conflict-flash {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    50%  { opacity: 0; }
    70%  { opacity: 1; }
    100% { opacity: 0; }
}
.ag-conflict-overlay {
    position: absolute;
    inset: 0;
    background: rgba(220, 50, 50, 0.45);
    pointer-events: none;
    animation: ag-conflict-flash 0.55s ease-in-out forwards;
    z-index: 10;
}

/* Neutralise tree hover/active styles that bleed into grid cells */
.ag-cell .tree-slot-inner:hover { background: transparent; }
.tree-slot.ag-cell.active-slot .tree-slot-inner { border: none; border-radius: 0; }

.tree-slot-inner:hover {
    background: #202020;
}

.tree-slot.active-slot .tree-slot-inner {
    border-color: #f5c542;
}

.tree-slot-name {
    font-size: 14px;
    color: #aaa;
    font-weight: 400;

    display: inline-flex;
    align-items: center;

    padding: 2px 4px;
    border-radius: 4px;
    user-select: none;
}

.tree-slot-name.collapsible {
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
}

.tree-slot-name.collapsible:hover {
    background: #2a2a2a;
    color: #f5c542;
}

/* Price chip in tree rows */
.tree-slot-item {

    align-items: center;
    gap: 6px;
}

.price-chip {

.cost-meta-row {

.cost-flea-refetch-btn {

.cost-price {

.cost-total-row {

.trader-level-row {

.trader-level-btns {

.tree-slot-item .tree-slot-icon img {

.attachment-icon-wrapper .slot-shortname,

   ARM STAMINA SECTION
========================= */

.beta-badge {
    font-size: 10px;
    font-weight: 700;
    color: #f5c542;
    border: 1px solid #f5c542;
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 0;
    letter-spacing: 1px;
    vertical-align: middle;

    display: inline-block;
}

.stamina-info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;

    color: #777;
    font-size: 9px;

    cursor: pointer;
    margin-left: 2px;

.stamina-info-btn:hover {

}

}

#lb-mode-builds #lb-builds-info-btn:hover {

}

.stamina-info-btn.eed-warn-active {

}

.stamina-info-btn.eed-warn-active:hover {

.stamina-panel {
    margin-top: 8px;

    border: 1px solid #222;

    transition: height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease, padding 0.2s ease, border-width 0.2s ease;

.stamina-disclaimer {

}

.strength-control label {

    display: block;

}

.strength-input-row {

    align-items: center;

}

.strength-input-row input[type="range"] {

.strength-input-row input[type="number"] {

.input-suffix, .input-prefix {

.eed-warning-icon {

/* =========================
   STAT BARS
========================= */

.stat-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  position: relative;
  min-height: 20px;
}

.stat-bar-label {
  font-size: 14px;
  color: #aaa;
  font-weight: 700;
  width: 88px;
  flex-shrink: 0;
  transform: scaleY(1.05);
  transform-origin: center left;
  z-index: 1;
  position: relative;
}

.stat-bar-track {
  position: absolute;
  left: 88px;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  height: 6px;
  background: #2a2a2a;
  border-radius: 3px;
}

.stat-bar-fill {
  position: absolute;
  height: 100%;
  border-radius: 3px;
  transition: width 0.35s ease, background 0.15s ease;
}

.delta-bar {
  position: absolute;
  height: 100%;
  border-radius: 3px;
  transition: transform 0.25s ease, opacity 0.15s ease;
}

.ergo-bar,
.recoil-bar {
  background: #444;
}

.accuracy-bar {
  background: #444;
}

.stat-bar-value {
  font-size: 13px;
  font-weight: 700;
  color: #eee;
  white-space: nowrap;
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1;
  text-shadow: 0 0 3px #000;
  line-height: 1;
}

.stats-divider {
  border: none;
  border-top: 1px solid #222;
  margin: 8px 0;
}

.stat-label {
    color: #aaa;
    user-select: none;
}

.stat-row {
    display: flex;
    align-items: center;
    margin-bottom: 4px;
    white-space: nowrap;
}

.stat-row .stat-label {
    width: 130px;
    flex-shrink: 0;
}

/* Stat subsection (lower text stats) */
.stat-subsection {
    font-size: 13px;
}

/* Deprecated overswing group */
.deprecated-group-outer {
    display: flex;
    align-items: stretch;
    margin-bottom: 4px;
}

.deprecated-group-rows {
    flex: 0 0 auto;
}

.deprecated-group-rows > .stat-row {
    opacity: 0.4;
    margin-bottom: 4px;
}

.deprecated-group-bracket {
    flex: 0 0 10px;
    border-right: 1.5px solid #cc3030;
    border-top: 1.5px solid #cc3030;
    border-bottom: 1.5px solid #cc3030;
    border-radius: 0 3px 3px 0;
    margin: 1px 0 1px 8px;
    position: relative;
}

.deprecated-group-bracket::after {
    content: '';
    position: absolute;
    left: calc(100% - 1px);
    top: 50%;
    width: 7px;
    height: 0;
    border-top: 1.5px solid #cc3030;
    transform: translateY(-50%);
}

.deprecated-group-note {
    font-size: 9.5px;
    color: #cc3030;
    font-style: italic;
}

.stat-row-deprecated > :not(.deprecated-group-note) {
    opacity: 0.4;
}

/* =========================
   MODAL
========================= */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: modalFadeIn 0.15s ease;
}

@keyframes modalFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-window {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 10px;
  min-width: 360px;
  max-width: 460px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
  animation: modalSlideIn 0.15s ease;
  overflow: hidden;
}

@keyframes modalSlideIn {
  from { transform: translateY(-12px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px 18px;
  border-bottom: 1px solid #2a2a2a;
}

.modal-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #f5c542;
  user-select: none;
}

.modal-close-btn {
  background: none;
  border: none;
  color: #666;
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}

.modal-close-btn:hover {
  color: #eee;
  background: #2a2a2a;
}

.modal-body {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #777;
  margin-bottom: 8px;
  user-select: none;
}

.modal-section {
  display: flex;
  flex-direction: column;
}

.modal-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.modal-divider {
  border: none;
  border-top: 1px solid #242424;
  margin: 0;
}

.modal-btn {
  background: #222;
  border: 1px solid #333;
  color: #ccc;
  padding: 8px 16px;
  border-radius: 5px;
  cursor: pointer;
  font-family: "Bender", Arial, sans-serif;
  font-size: 13px;
  font-weight: 700;

/* =========================
   PANEL LOADING FLASH
========================= */

@keyframes panelLoadingSweep {
  0%   { transform: translateX(-100%); }
  25%  { transform: translateX(100%); }
  100% { transform: translateX(100%); }
}

.panel-loading-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}

.panel-loading-overlay::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    90deg,
    rgba(180, 180, 180, 0) 0%,
    rgba(180, 180, 180, 0.12) 50%,
    rgba(180, 180, 180, 0) 100%
  );
  animation: panelLoadingSweep 1.5s ease-out infinite;
}

/* =========================
   IMAGE PLACEHOLDER SHIMMER
========================= */

@keyframes eft-img-shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position:  600px 0; }
}

.gun-card img:not(.loaded),
.tree-slot-icon img:not(.loaded),
.attachment-icon:not(.loaded),
.att-table-gun-img:not(.loaded),
.cb-gun-img:not(.loaded),
.cb-avatar:not(.loaded),
.cost-item-icon:not(.loaded),
.cost-trader-portrait:not(.loaded),
.price-chip-portrait:not(.loaded) {
  background: linear-gradient(
    90deg,
    #181818 25%,
    #242424 50%,
    #181818 75%
  );
  background-size: 600px 100%;
  animation: eft-img-shimmer 1.4s linear infinite;
}

/* =========================
   NEWS PAGE
========================= */

#news-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s ease;
}

#news-backdrop.visible {
  opacity: 1;
  pointer-events: auto;
}

#news-overlay {
  position: fixed;
  top: 0;
  right: 0;
  height: 100%;
  width: 50%;
  min-width: 380px;
  max-width: 720px;
  background: #141414;
  border-left: 1px solid #2a2a2a;
  box-shadow: -12px 0 48px rgba(0, 0, 0, 0.7);
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateX(100%);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
}

#news-overlay.visible {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
}

.news-header {
  flex-shrink: 0;
  background: #1a1a1a;
  border-bottom: 1px solid #2a2a2a;
  padding: 0 20px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.news-header-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #f5c542;
  user-select: none;
}

.news-close-btn {
  background: none;
  border: none;
  color: #888;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 6px;
  line-height: 1;
  margin-left: auto;
  transition: color 0.15s;
}

.news-close-btn:hover { color: #eee; }

.news-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 28px 24px;
  scrollbar-width: thin;
  scrollbar-color: #444 #111;
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
}

@keyframes news-in-right {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes news-in-left {
  from { opacity: 0; transform: translateX(-40px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes news-out-left {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-40px); }
}
@keyframes news-out-right {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(40px); }
}
.news-page { animation: news-in-right 0.22s cubic-bezier(0.4,0,0.2,1) both; }
.news-page--back { animation: news-in-left 0.22s cubic-bezier(0.4,0,0.2,1) both; }
.news-page--exit-left { animation: news-out-left 0.16s cubic-bezier(0.4,0,0.2,1) both; }
.news-page--exit-right { animation: news-out-right 0.16s cubic-bezier(0.4,0,0.2,1) both; }

.news-body::-webkit-scrollbar { width: 10px; }
.news-body::-webkit-scrollbar-track { background: #111; }
.news-body::-webkit-scrollbar-thumb {
  background: #3a3a3a;
  border-radius: 6px;
  border: 2px solid #111;
}
.news-body::-webkit-scrollbar-thumb:hover { background: #555; }

/* Post list grid */
.news-post-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.news-post-card {
  background: #151515;
  border: 1px solid #222;
  border-left: 3px solid #f5c542;
  border-radius: 8px;
  padding: 18px 20px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  min-height: 90px;
  overflow: hidden;
}

.news-post-card:hover {
  background: #1c1c1c;
  border-color: #333;
  border-left-color: #ffd966;
  transform: translateY(-2px);
}

.news-post-card:active {
  transform: translateY(0);
  transition: transform 0.08s ease;
}

.news-card-media-wrap {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  display: flex;
  align-items: center;
  pointer-events: none;
}

.news-card-media-wrap::before,
.news-card-media-wrap::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 65%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.news-card-media-wrap::before {
  background: linear-gradient(to right, #151515, transparent);
}

.news-card-media-wrap::after {
  background: linear-gradient(to right, #1c1c1c, transparent);
  opacity: 0;
  transition: opacity 0.2s;
}

.news-post-card:hover .news-card-media-wrap::after {
  opacity: 1;
  transition: opacity 0.08s;
}

.news-card-media {
  height: 100%;
  width: auto;
  object-fit: cover;
  display: block;
  border-radius: 0;
  margin: 0;
}

.news-card-logo-bg {
  width: 38%;
  background: #0d0d0d;
  justify-content: center;
}

.news-card-logo-bg img {
  height: 55px;
  width: auto;
  display: block;
}

.news-card-text {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-width: 72%;
}

.news-card-title {
  font-size: 15px;
  font-weight: 700;
  color: #e8e8e8;
  letter-spacing: 0.3px;
}

.news-card-date {
  font-size: 11px;
  color: #555;
  letter-spacing: 1px;
}

.news-card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 2px;
}

.news-card-tag {
  font-size: 10px;
  font-weight: 700;
  color: #f5c542;
  border: 1px solid #3a3000;
  background: #1f1900;
  border-radius: 3px;
  padding: 1px 7px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: "Bender", Arial, sans-serif;
}
.news-card-tag--minor-update {
  color: #81c784;
  border-color: #1a3d1c;
  background: #0d1f0e;
}
.news-card-tag--small-patch {
  color: #29b6f6;
  border-color: #0d3a4f;
  background: #061e2a;
}
.news-card-tag--major-update {
  color: #ce93d8;
  border-color: #3b1a4a;
  background: #1e0d27;
}
.news-card-tag--dev {
  color: #ef5350;
  border-color: #4f1010;
  background: #2a0808;
}
.news-post-card--dev {
  border-left-color: #ef5350;
}
.news-post-card--dev:hover {
  border-left-color: #ef9a9a;
}

.news-card-summary {
  font-size: 13px;
  color: #777;
  line-height: 1.6;
  margin-top: 4px;
}

.news-empty,
.news-loading,
.news-error {
  text-align: center;
  color: #444;
  font-size: 14px;
  padding: 70px 20px;
  letter-spacing: 1px;
}

.news-error {
  border: 1px dashed #2a2a2a;
  border-radius: 8px;
  color: #666;
}

/* Single post view */
.news-post-view {
  max-width: 760px;
  margin: 0 auto;
}

.news-post-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.news-post-meta-date {
  font-size: 12px;
  color: #555;
  letter-spacing: 1px;
}

.news-back-btn {
  background: none;
  border: 1px solid #2a2a2a;
  color: #888;
  font-family: "Bender", Arial, sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  padding: 5px 14px;
  border-radius: 4px;
  letter-spacing: 1px;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  display: inline-block;
}

.news-back-btn:hover {
  color: #f5c542;
  background: #1a1a1a;
  border-color: #444;
}

.news-back-btn:active {
  transform: scale(0.95);
}

/* Markdown content styling */
.news-post-content {
  color: #c8c8c8;
  font-size: 15px;
  line-height: 1.8;
}

.news-post-content h1 {
  font-size: 24px;
  font-weight: 700;
  color: #f5c542;
  letter-spacing: 1px;
  margin: 0 0 10px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid #222;
}

.news-post-content h2 {
  font-size: 18px;
  font-weight: 700;
  color: #e8e8e8;
  margin: 30px 0 12px 0;
  padding-left: 12px;
  border-left: 3px solid #f5c542;
}

.news-post-content h3 {
  font-size: 15px;
  font-weight: 700;
  color: #ddd;
  margin: 22px 0 8px 0;
}

.news-post-content h4,
.news-post-content h5,
.news-post-content h6 {
  font-size: 13px;
  font-weight: 700;
  color: #bbb;
  margin: 16px 0 6px 0;
}

.news-post-content p { margin: 0 0 14px 0; }

.news-post-content a {
  color: #5b9bd5;
  text-decoration: none;
}

.news-post-content a:hover {
  text-decoration: underline;
  text-underline-offset: 3px;
}

.news-post-content ul,
.news-post-content ol {
  margin: 0 0 14px 0;
  padding-left: 26px;
}

.news-post-content li { margin-bottom: 5px; }

.news-post-content code {
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  border-radius: 4px;
  padding: 1px 6px;
  font-family: "Consolas", "Courier New", monospace;
  font-size: 13px;
  color: #e0c080;
}

.news-post-content pre {
  background: #161616;
  border: 1px solid #222;
  border-radius: 6px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 0 0 16px 0;
}

.news-post-content pre code {
  background: none;
  border: none;
  padding: 0;
  color: #bbb;
  font-size: 13px;
}

.news-post-content blockquote {
  margin: 0 0 14px 0;
  padding: 10px 16px;
  border-left: 3px solid #3a3a3a;
  background: #161616;
  color: #888;
  border-radius: 0 6px 6px 0;
}

.news-post-content img {
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  display: block;
  margin: 14px 0;
}

.news-post-content video {
  max-width: 100%;
  border-radius: 6px;
  display: block;
  margin: 14px 0;
}

.news-title-hero {
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  margin: 0 0 24px 0;
  background: #0d0d0d;
  max-height: 1000px;
}
.news-title-hero video,
.news-title-hero img {
  width: 100%;
  height: auto;
  display: block;
  margin: 0;
}
.news-title-hero--logo img {
  width: auto;
  height: 180px;
  max-width: 28%;
  margin: 0 auto;
  object-fit: contain;
}
.news-title-hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(transparent, #141414);
  z-index: 1;
  pointer-events: none;
}
.news-title-overlay {
  padding: 0 20px 16px;
  background: none;
  position: absolute;
  bottom: 10px;
  left: 0;
  right: 0;
  z-index: 2;
}
.news-title-overlay h1 {
  margin: 0;
  padding: 0;
  border: none;
  color: #f5c542;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 1px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}

.news-post-content hr {
  border: none;
  border-top: 1px solid #222;
  margin: 24px 0;
}

.news-post-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 13px;
}

.news-post-content th {
  background: #1a1a1a;
  color: #f5c542;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid #2a2a2a;
  font-weight: 700;
}

.news-post-content td {
  padding: 8px 12px;
  border-bottom: 1px solid #1c1c1c;
}

.news-post-content strong { color: #e8e8e8; }
.news-post-content em    { color: #b8b8b8; }

/* News responsive overrides */
@media (max-width: 640px) {
  #news-overlay {
    width: 100%;
    min-width: unset;
    max-width: unset;
  }

  .news-body {
    padding: 16px 14px;
  }

  .news-post-content h1 { font-size: 20px; }
  .news-post-content h2 { font-size: 16px; }

  .news-header {
    padding: 0 14px;
  }
}

/* =============================================
   MOBILE LAYOUT
   Uses body[data-mobile="true"] (set by JS via
   isMobileLayout()) so it applies on ALL touch
   devices regardless of screen orientation.
   Portrait-specific cosmetic rules use a media
   query as well.
============================================= */

/* --- Core single-panel layout (all touch devices, portrait AND landscape) --- */

/* Portrait: whole panel scrolls as one column; landscape: individual grid cells scroll */
body[data-mobile="true"] .left-panel { width: 100% !important; overflow-y: auto; overflow-x: hidden; }
body[data-mobile="true"] .panel-resizer { display: none !important; }

/* Portrait: single-column, full-panel scroll */
body[data-mobile="true"] #left-build-area {
  flex: none;
  min-height: 0;
}
body[data-mobile="true"] #slots {
  overflow: visible;
  flex: none;
}
body[data-mobile="true"] #price-overview {
  overflow: visible;
  flex: none;
}

/* Landscape: two-column grid (stats left | slot tree right),
   both columns scroll independently within the panel height. */
@media (orientation: landscape) {
  body[data-mobile="true"] .left-panel { overflow: hidden; }
  body[data-mobile="true"] #left-build-area {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
  }
  body[data-mobile="true"] #build-controls { grid-column: 1 / -1; }
  body[data-mobile="true"] #view-toggle    { grid-column: 1 / -1; }
  body[data-mobile="true"] #stats {
    grid-column: 1;
    grid-row: 3;
    overflow-y: auto;
    min-height: 0;
    padding-right: 8px;
    border-right: 1px solid #1e1e1e;
  }
  body[data-mobile="true"] #slots {
    grid-column: 2;
    grid-row: 3;
    overflow-y: auto;
    min-height: 0;
    padding-left: 8px;
    flex: none;
    overflow-x: hidden;
  }
  body[data-mobile="true"] #price-overview {
    grid-column: 1 / -1;
    grid-row: 3;
    overflow-y: auto;
    min-height: 0;
    flex: none;
  }

}

body[data-mobile="true"] .right-panel {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  top: 44px;
  z-index: 150;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  background: #111;
  padding: 0 12px 16px;
  contain: none; /* remove paint containment so fixed children use the viewport */
  overflow-y: auto;
  overflow-x: hidden;
}

body[data-mobile="true"].mobile-right-open .right-panel { transform: translateY(0); }

/* Dim backdrop behind the open drawer */
body[data-mobile="true"].mobile-right-open::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 149;
}

/* Drag-handle pip at top of drawer */
body[data-mobile="true"] .right-panel::before {
  content: "";
  display: block;
  width: 36px;
  height: 4px;
  background: #333;
  border-radius: 2px;
  margin: 12px auto 4px;
  flex-shrink: 0;
}

/* Back button (shown only on mobile) */
body[data-mobile="true"] #mobile-drawer-back {
  display: flex;
  align-items: center;
  padding: 10px 0 12px;
  color: #888;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border-bottom: 1px solid #222;
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Scrollbars: hidden on touch */
body[data-mobile="true"] .right-panel,
body[data-mobile="true"] .left-panel,
body[data-mobile="true"] #slots,
body[data-mobile="true"] #stats,
body[data-mobile="true"] #weapon-selector,
body[data-mobile="true"] #price-overview { scrollbar-width: none; }
body[data-mobile="true"] .right-panel::-webkit-scrollbar,
body[data-mobile="true"] .left-panel::-webkit-scrollbar,
body[data-mobile="true"] #slots::-webkit-scrollbar,
body[data-mobile="true"] #stats::-webkit-scrollbar { display: none; }

/* Swipe-to-remove: reveal strip */
body[data-mobile="true"] .swipe-removable {
  position: relative;
  overflow: hidden;
  transition: transform 0.12s ease;
}
body[data-mobile="true"] .swipe-removable::after {
  content: "Remove";
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 80px;
  background: #c0392b;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
  transform: translateX(100%);
  transition: transform 0.12s ease;
  pointer-events: none;
}
body[data-mobile="true"] .swipe-removable.swipe-revealing::after { transform: translateX(0); }

/* Modals: centered, constrained to screen on all mobile orientations */
body[data-mobile="true"] .modal-window {
  min-width: unset;
  max-width: calc(100vw - 32px);
  max-height: 85vh;
  overflow-y: auto;
}

/* Touch targets (apply on all touch devices) */
body[data-mobile="true"] .tree-slot-inner { padding: 5px 8px; font-size: 13px; }
.tree-swipe-hint { display: none; }
body[data-mobile="true"] .tree-swipe-hint {
  display: inline;
  font-size: 10px;
  font-weight: 400;
  color: #555;
  letter-spacing: 0.5px;
  margin-left: 8px;
  text-transform: none;
  vertical-align: middle;
}
body[data-mobile="true"] .toggle-btn { padding: 10px 0; font-size: 13px; }
body[data-mobile="true"] .modal-close-btn { padding: 8px 10px; }
body[data-mobile="true"] .custom-select-option { padding: 10px 12px; }
body[data-mobile="true"] .back-button { padding: 8px 10px; }
body[data-mobile="true"] .saved-build-btn { padding: 8px 10px; }

/* Attachment table: sticky header fix */
body[data-mobile="true"] .attachment-table th { top: 0; padding-top: 10px; }

/* Gun cards: disable mouse-only effects, add tap feedback */
body[data-mobile="true"] .gun-card::before,
body[data-mobile="true"] .gun-card::after { display: none; }
body[data-mobile="true"] .gun-card:hover img { transform: none; }
body[data-mobile="true"] .gun-card:active { border-color: #f5c542; opacity: 0.85; }

/* Toasts: full width */
body[data-mobile="true"] #toast-container { left: 12px; right: 12px; bottom: 12px; }
body[data-mobile="true"] .toast { min-width: unset; max-width: unset; width: 100%; box-sizing: border-box; }

/* Tree: reduced indentation */
body[data-mobile="true"] .tree-children { margin-left: 12px; padding-left: 8px; }
body[data-mobile="true"] .tree-slot-name { font-size: 13px; }

/* Community builds: keep 2 columns, scaled-down cards */
body[data-mobile="true"] #public-builds-list { grid-template-columns: repeat(2,1fr); }
body[data-mobile="true"] .cb-gun-area { min-height: 48px; padding: 6px 10px; }
body[data-mobile="true"] .cb-gun-img { max-height: 44px; }
body[data-mobile="true"] .cb-card-body { padding: 5px 8px 4px; }
body[data-mobile="true"] .cb-build-name { font-size: 11px; }
body[data-mobile="true"] .cb-author { font-size: 10px; }
body[data-mobile="true"] .cb-publish-date,
body[data-mobile="true"] .cb-load-count { font-size: 9px; }
body[data-mobile="true"] .cb-stat { padding: 3px 4px; }
body[data-mobile="true"] .cb-stat-label { font-size: 8px; }
body[data-mobile="true"] .cb-stat-val { font-size: 11px; }
body[data-mobile="true"] .cb-card-footer { padding: 4px 6px; }

/* =============================================
   PORTRAIT PHONE - cosmetic only
   Extra compression for very narrow screens.
   Core layout comes from body[data-mobile] above.
============================================= */

@media (max-width: 767px) {
  /* Header compression */
  header { padding: 0 10px; gap: 8px; }
  #tarkov-clock { display: none; }
  .header-btn { padding: 5px 8px; font-size: 11px; letter-spacing: 0.5px; }
  #about-btn { display: none; }

  /* iOS zoom-on-focus fix */
  .search-input, input[type="text"] { font-size: 16px; }

  /* Hide EVO ergo column (too narrow) */
  .attachment-table th:nth-child(5),
  .attachment-table td:nth-child(5) { display: none; }



}

/* =============================================
   TABLET - non-touch large tablets or devtools
   Only applies when body[data-mobile] is NOT set
   (i.e. a mouse-driven tablet or desktop resized)
============================================= */

@media (min-width: 768px) and (max-width: 1023px) {
  body:not([data-mobile="true"]) .left-panel { width: 420px !important; }
  body:not([data-mobile="true"]) #tarkov-clock { display: none; }
}

<body>

<header>
  <div class="header-content">
    <div class="header-logo-link" onclick="if (EFTForge.state.currentGun) returnToGunSelection()">
      <img class="header-logo-img" src="./assets/images/EFTForge1080x1080.png" alt="EFTForge Logo" />
      <h2>EFTForge</h2>
    </div>
    <div id="tarkov-clock">
      <span id="tarkov-clock-label">TARKOV</span>
      <span class="tarkov-clock-entry">
        <span id="tarkov-dot-left"  class="tarkov-dot"></span>
        <span id="tarkov-time-left" class="tarkov-clock-time">--:--</span>
      </span>
      <span id="tarkov-clock-sep">/</span>
      <span class="tarkov-clock-entry">
        <span id="tarkov-dot-right"  class="tarkov-dot"></span>
        <span id="tarkov-time-right" class="tarkov-clock-time">--:--</span>
      </span>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
      <div id="lang-switcher">
        <select id="lang-select" onchange="switchLang(this.value)">
          <option value="en">EN</option>
          <option value="zh">简中</option>
        </select>
      </div>
      <button id="about-btn" class="header-btn" style="margin-left:0;" onclick="showAboutDialog()">About</button>
      <button id="tracker-btn" class="header-btn" style="margin-left:0;" data-badge="" data-badge-pulse="false" onclick="EFTForge.tracker.showPanel()">Tracker</button>
      <button id="leaderboard-btn" class="header-btn" style="margin-left:0;" onclick="EFTForge.leaderboard.showPanel()">Leaderboards</button>
      <button id="news-btn" class="header-btn" style="margin-left:0;" onclick="EFTForge.news.showPage()">News</button>
      <button id="builds-btn" class="header-btn" style="margin-left:0;" onclick="showBuildsDialog()">Builds</button>
    </div>
  </div>
</header>

<div class="container no-gun" id="main-container">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div id="weapon-selector">

        <div class="weapon-toggle">
            <button id="primary-btn" class="toggle-btn active">Primary</button>
            <button id="handgun-btn" class="toggle-btn">Pistol</button>
            <div class="toggle-divider"></div>
            <button id="sort-caliber-btn" class="toggle-btn active">Caliber</button>
            <button id="sort-class-btn" class="toggle-btn">Class</button>
        </div>

        <input
            type="text"
            id="gun-search"
            placeholder="Start typing to search..."
            class="search-input"
        />
        <div id="guns" class="gun-grid"></div>
    </div>

    <div id="left-build-area" style="display:none;">
        <div id="build-controls" style="display:flex; gap:8px; margin:8px 20px 4px 0;">
            <button id="back-btn" class="back-button" style="margin:0; width:auto; flex:1;" onclick="returnToGunSelection()">&#x2190; Back</button>
            <button id="reset-btn" class="back-button" style="margin:0; width:auto; flex:1;" onclick="resetBuild()">&#x21BA; Reset Build</button>
            <button id="strip-btn" class="back-button" style="margin:0; width:auto; flex:1;" onclick="stripBuild()">&#x2702; Strip Build</button>
            <button id="save-share-btn" class="back-button" style="margin:0; width:auto; flex:1;" onclick="showSaveBuildDialog()">Save / Share</button>
            <button id="gun-builds-btn" class="back-button" style="margin:0; width:auto; flex:1;" data-badge-pulse="false" onclick="showGunBuildsDialog()">&#128190; Builds</button>
        </div>
        <div id="view-toggle" style="display:flex; gap:8px; margin:6px 20px 12px 0;">
            <button id="view-build-btn" class="toggle-btn active" style="font-size:12px; padding:5px 6px;" onclick="showBuildView()"></button>
            <button id="view-price-btn" class="toggle-btn" style="font-size:12px; padding:5px 6px;" onclick="showPriceView()"></button>
        </div>
        <div id="stats"></div>
        <div id="slots"></div>
        <div id="price-overview" style="display:none;"></div>
    </div>
  </div>

  <!-- MOBILE PUBLISH TRAY (fixed bottom bar, mobile-only, publish mode only) -->
  <div id="mobile-publish-tray"></div>

  <!-- PANEL RESIZER -->
  <div id="panel-resizer" class="panel-resizer">
    <div class="panel-resizer-handle"></div>
    <div class="panel-resizer-publish-hint">
      <span>&#x3C;</span>
      <span>&#x3C;</span>
      <span>&#x3C;</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
    <div class="right-panel">

        <div id="mobile-drawer-back">&#8592; Back to Build</div>

        <div id="attachment-placeholder" class="attachment-placeholder">
            <div class="placeholder-inner">
                <img id="gun-display-image" style="display:none; max-width:100%; max-height:180px; object-fit:contain; margin-bottom:16px;" />
                <div id="gun-display-name" style="font-size:22px; font-weight:700; color:#f5c542; margin-bottom:16px;"></div>

                </em></strong>
                <span class="placeholder-sub">
                    <strong><em id="placeholder-sub">
                        Right click an attachment to remove it
                    </em></strong>
                </span>
            </div>
        </div>

        <div id="attachment-table-container"></div>

    </div>

</div>

<!-- NEWS BACKDROP + DRAWER -->
<div id="news-backdrop" onclick="EFTForge.news.hidePage()"></div>
<div id="news-overlay">
  <div class="news-header">
    <span class="news-header-title" id="news-header-title">NEWS</span>
    <button class="news-close-btn" id="news-close-btn" onclick="EFTForge.news.hidePage()">&#x2715;</button>
  </div>
  <div class="news-body" id="news-body">
    <div class="news-loading">Loading...</div>
  </div>
</div>

<div id="leaderboard-backdrop" onclick="EFTForge.leaderboard.hidePanel()"></div>
<div id="leaderboard-overlay">
  <div class="leaderboard-header">
    <span class="leaderboard-header-title" id="leaderboard-header-title">LEADERBOARDS</span>
    <button class="leaderboard-close-btn" onclick="EFTForge.leaderboard.hidePanel()">&#x2715;</button>
  </div>
  <div class="leaderboard-controls">
    <div class="lb-toggle-row">

    <div id="lb-gun-row" class="lb-gun-row">
      <div class="lb-gun-search">
        <input id="lb-gun-input" class="lb-gun-input" type="text" autocomplete="off" spellcheck="false" placeholder="All Guns">
        <div id="lb-gun-dropdown" class="lb-gun-dropdown"></div>
      </div>
    </div>
    <div class="lb-filter-row">
      <span id="lb-cap-label" class="lb-cap-label">Top 10</span>

      </div>
      <div id="lb-sort-row" class="lb-select-wrap" style="display:none;">

          <option value="dislikes">Most Disliked</option>

      </div>
      <div id="lb-category-row" class="lb-select-wrap" style="display:none;">
        <select id="lb-category-select">
          <option value="all">All Slots</option>
        </select>
      </div>
    </div>
  </div>
  <div class="leaderboard-body" id="leaderboard-body"></div>
</div>

<!-- TRACKER BACKDROP + DRAWER -->
<div id="tracker-backdrop" onclick="EFTForge.tracker.hidePanel()"></div>
<div id="tracker-overlay">
  <div class="tracker-header">
