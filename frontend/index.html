<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>db4tarkov CN - EvoErgo Tool</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #eee;
  }

  header {
    background-color: #1a1a1a;
    padding: 15px 20px;
    border-bottom: 1px solid #333;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h2 {
    margin: 0;
    color: #f5c542;
    font-weight: 600;
  }

  .container {
    display: flex;
    height: calc(100vh - 70px);
  }

  .left-panel {
    width: 35%;
    overflow-y: auto;
    padding: 20px;
    border-right: 1px solid #333;
  }

  .right-panel {
    width: 65%;
    padding: 20px;
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  h3 {
    margin-top: 0;
  }

  li {
    cursor: pointer;
    margin-bottom: 6px;
  }

  .selected-gun {
    background-color: #333;
    padding: 6px;
    border-radius: 4px;
  }

  .positive {
    color: #4CAF50;
    font-weight: 600;
  }

  .negative {
    color: #f44336;
    font-weight: 600;
  }

  hr {
    border: none;
    border-top: 1px solid #333;
    margin: 20px 0;
  }

  button {
    margin-bottom: 10px;
    background-color: #222;
    border: 1px solid #444;
    color: #eee;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s ease;
  }

  button:hover {
    background-color: #333;
  }

  /* ===========================
     ATTACHMENT TABLE
  ============================ */

  .attachment-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 14px;
  }

  .attachment-table thead {
    background-color: #1a1a1a;
    border-bottom: 1px solid #444;
  }

  .attachment-table th {
    padding: 8px 10px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    background-color: #1a1a1a;
    z-index: 2;
    transition: background 0.15s ease;
  }

  .attachment-table th:hover {
    background-color: #2a2a2a;
  }

  .attachment-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #222;
  }

  .attachment-table tbody tr:nth-child(even) {
    background-color: #151515;
  }

  .attachment-table tbody tr:hover {
    background-color: #222;
  }

  /* Right-align numeric columns */
  .attachment-table td:nth-child(2),
  .attachment-table td:nth-child(3),
  .attachment-table td:nth-child(4) {
    text-align: right;
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #111;
  }

  ::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #444;
  }

  /* Active sorted column */
.active-sort {
  color: #f5c542;
  font-weight: 700;
}

.sort-indicator {
  font-size: 12px;
  margin-left: 4px;
}

.attachment-name-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}

.attachment-icon {
  width: 40px;
  height: 40px;
  object-fit: contain;
  background-color: #1a1a1a;
  border-radius: 4px;
}

.gun-list-item {
  display: flex;
  gap: 10px;
  align-items: center;
}

.gun-list-icon {
  width: 50px;
  height: 50px;
  object-fit: contain;
  background-color: #1a1a1a;
  border-radius: 4px;
}

.gun-base-ergo {
  font-size: 12px;
  color: #aaa;
}

.header-content {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header-gun-image {
  max-height: 70px;
  width: auto;
  object-fit: contain;
}

#stats h3 {
  margin-top: 20px;
  color: #f5c542;
  font-size: 16px;
}

#stats div {
  margin-bottom: 6px;
  font-size: 14px;
}
</style>
</head>

<body>

  <header>
  <div class="header-content">
    <img id="header-gun-image" class="header-gun-image" />
    <h2 id="current-gun-label">No Gun Selected</h2>
  </div>
</header>

  <div class="container">
    <div class="left-panel">
      <h3>Weapons</h3>
      <ul id="guns"></ul>
    </div>

    <div class="right-panel">
      <div id="stats"></div>
      <hr>
      <div id="slots"></div>
    </div>
  </div>

  <script src="app.js?v=5"></script>

</body>
</html>
