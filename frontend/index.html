<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>db4tarkov CN - EvoErgo Tool</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #eee;
    }

    header {
      background-color: #1a1a1a;
      padding: 15px 20px;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h2 {
      margin: 0;
      color: #f5c542;
      font-weight: 600;
    }

    .container {
      display: flex;
      height: calc(100vh - 70px);
    }

    .left-panel {
      width: 35%;
      overflow-y: auto;
      padding: 20px;
      border-right: 1px solid #333;
    }

    .right-panel {
      width: 65%;
      padding: 20px;
      overflow-y: auto;
    }

    h3 {
      margin-top: 0;
    }

    li {
      cursor: pointer;
      margin-bottom: 6px;
    }

    .selected-gun {
      background-color: #333;
      padding: 6px;
      border-radius: 4px;
    }

    .selected-attachment {
      background-color: #333;
      padding: 6px;
      border-radius: 4px;
    }

    .positive {
      color: #4CAF50;
      font-weight: 600;
    }

    .negative {
      color: #f44336;
      font-weight: 600;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 20px 0;
    }

    button {
      margin-bottom: 10px;
      background-color: #222;
      border: 1px solid #444;
      color: #eee;
      padding: 4px 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #333;
    }
  </style>
</head>

<body>

  <header>
    <h2 id="current-gun-label">No Gun Selected</h2>
  </header>

  <div class="container">
    <div class="left-panel">
      <h3>Weapons</h3>
      <ul id="guns"></ul>
    </div>

    <div class="right-panel">
      <div id="stats"></div>
      <hr>
      <div id="slots"></div>
    </div>
  </div>

  <script src="app.js?v=5"></script>

</body>
</html>
