<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>db4tarkov CN - EvoErgo Tool</title>

<style>

/* =========================
   GLOBAL
========================= */

@font-face {
  font-family: "Bender";
  src: url("./assets/fonts/Bender.otf") format("opentype");
}

@font-face {
  font-family: "Bender";
  src: url("./assets/fonts/Bender-Bold.otf") format("opentype");
  font-weight: 700;
}

html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  font-family: "Bender", Arial, sans-serif;
  letter-spacing: 0.4px;
  background-color: #111;
  color: #eee;
}

/* =========================
   HEADER
========================= */

header {
  background-color: #1a1a1a;
  padding: 15px 20px;
  border-bottom: 1px solid #333;
  position: sticky;
  top: 0;
  z-index: 100;
}

header h2 {
  margin: 0;
  color: #f5c542;
  font-weight: 700;
}

.header-content {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header-gun-image {
  max-height: 70px;
  object-fit: contain;
}

/* =========================
   LAYOUT
========================= */

.container {
  display: flex;
  flex: 1;
  min-height: 0;
}

.left-panel {
  width: 35%;
  overflow-y: auto;
  padding: 20px;
  border-right: 1px solid #333;
  min-height: 0;
}

.right-panel {
  width: 65%;
  overflow-y: auto;
  padding: 20px;
  min-height: 0;
}

/* Fullscreen selector mode */
.container.no-gun .left-panel {
  width: 100%;
}

.container.no-gun .right-panel {
  display: none;
}

/* =========================
   WEAPON LIST
========================= */

#guns {
  list-style: none;
  padding: 0;
  margin: 0;
}

.gun-list-item {
  display: flex;
  gap: 10px;
  align-items: center;
}

.gun-list-icon {
  width: 50px;
  height: 50px;
  object-fit: contain;
  background-color: #1a1a1a;
  border-radius: 4px;
}

.selected-gun {
  background-color: #333;
  padding: 6px;
  border-radius: 4px;
}

/* =========================
   SCROLLBARS
========================= */

.left-panel,
.right-panel {
  scrollbar-width: thin;
  scrollbar-color: #444 #111;
}

.left-panel::-webkit-scrollbar,
.right-panel::-webkit-scrollbar {
  width: 10px;
}

.left-panel::-webkit-scrollbar-track,
.right-panel::-webkit-scrollbar-track {
  background: #111;
}

.left-panel::-webkit-scrollbar-thumb,
.right-panel::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 6px;
  border: 2px solid #111;
}

.left-panel::-webkit-scrollbar-thumb:hover,
.right-panel::-webkit-scrollbar-thumb:hover {
  background: #555;
}

*, *::before, *::after {
  box-sizing: border-box;
}

/* =========================
   STATS SECTION
========================= */

.stats-section {
  background: linear-gradient(180deg, #181818, #141414);
  border: 1px solid #222;
  border-radius: 8px;
  padding: 14px 16px 12px 16px;
  margin-bottom: 14px;
}

.section-title {
  color: #f5c542;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-left: 10px;
  border-left: 3px solid #f5c542;
}

.stat-line {
  margin-bottom: 6px;
  font-size: 14px;
  font-weight: 700;
}

/* =========================
   AMMO SELECT
========================= */

#ammo-select {
  background-color: #1a1a1a;
  color: #eee;
  border: 1px solid #444;
  padding: 4px 8px;
  border-radius: 4px;
  font-family: "Bender", Arial, sans-serif;
}

.mag-controls {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}

/* =========================
   ATTACHMENT TABLE
========================= */

.attachment-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  margin-top: 15px;
}

.attachment-table th,
.attachment-table td {
  padding: 10px 12px;
}

.attachment-table th {
  text-align: left;
  color: #aaa;
  font-weight: 700;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.attachment-table td {
  border-bottom: 1px solid #1f1f1f;
  vertical-align: middle;
}

/* Column widths */
.attachment-table th:nth-child(1),
.attachment-table td:nth-child(1) {
  width: 55%;
}

.attachment-table th:nth-child(2),
.attachment-table td:nth-child(2),
.attachment-table th:nth-child(3),
.attachment-table td:nth-child(3),
.attachment-table th:nth-child(4),
.attachment-table td:nth-child(4) {
  width: 15%;
  text-align: right;
  font-weight: 700;
  font-family: "Bender", Arial, sans-serif;
}

/* Attachment name + icon */
.attachment-name-wrapper {
  display: flex;
  align-items: center;
  gap: 14px;
}

.attachment-icon {
  width: 48px;
  height: 48px;
  object-fit: contain;
  flex-shrink: 0;
  display: block;
}

/* Prevent tall rows */
.attachment-table tbody tr {
  height: 64px;
}

/* =========================
   VALUE COLORS
========================= */

.positive {
  color: #4CAF50;
  font-weight: 700;
}

.negative {
  color: #f44336;
  font-weight: 700;
}

/* =========================
   SEARCH INPUT
========================= */

.search-input {
  width: 100%;
  padding: 6px 10px;
  margin-bottom: 12px;
  background-color: #1a1a1a;
  border: 1px solid #333;
  border-radius: 4px;
  color: #eee;
  font-family: "Bender", Arial, sans-serif;
}

.search-input:focus {
  outline: none;
  border-color: #f5c542;
}

/* =========================
   ACTIVE PANEL INDICATION
========================= */

.left-panel,
.right-panel {
  transition: background-color 0.15s ease;
  background-color: #111;
}

.panel-active {
  background-color: #161616;
}

.weapon-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.toggle-btn {
  flex: 1;
  padding: 6px 0;
  background-color: #1a1a1a;
  border: 1px solid #333;
  color: #aaa;
  cursor: pointer;
  font-family: "Bender", Arial, sans-serif;
  font-weight: 700;
}

.toggle-btn.active {
  background-color: #333;
  color: #f5c542;
  border-color: #444;
}

button {
  font-family: "Bender", Arial, sans-serif;
}

.back-button {
  background-color: #1a1a1a;
  color: #eee;
  border: 1px solid #333;
  padding: 6px 12px;
  border-radius: 4px;
  font-family: "Bender", Arial, sans-serif;
  font-size: 13px;
  cursor: pointer;
  margin: 8px 0 12px 0;
  transition: background-color 0.15s ease;
}

.back-button:hover {
  background-color: #2a2a2a;
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <img id="header-gun-image" class="header-gun-image" />
    <h2 id="current-gun-label">No Gun Selected</h2>
  </div>
</header>

<div class="container no-gun" id="main-container">
  <div class="left-panel">
    <h3>Weapons</h3>

    <div class="weapon-toggle">
        <button id="primary-btn" class="toggle-btn active">Primary</button>
        <button id="handgun-btn" class="toggle-btn">Pistol</button>
    </div>

    <input
        type="text"
        id="gun-search"
        placeholder="Start typing to search..."
        class="search-input"
    />

    <ul id="guns"></ul>
    </div>

  <div class="right-panel">
    <div id="stats"></div>
    <div id="slots"></div>
  </div>
</div>

<script src="app.js?v=6"></script>
</body>
</html>
