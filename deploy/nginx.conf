server {
    listen 80;
    server_name your-domain.com;

    root /var/www/eftforge/frontend;
    index index.html;

    # Never cache index.html so users always get the latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache static assets for 1 year (cache-busting via ?v= query strings)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2|woff|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the FastAPI backend
    location ~* ^/(health|traders|guns|build|builds|ratings|leaderboard|announcements|admin|build-image|stat-changelog|ammo|items|slots)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 130s;
    }

    # Serve frontend static files; SPA fallback for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
